server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: sync-manager
    static_configs:
      - targets:
          - localhost
        labels:
          job: sync-manager
          host: vm1
          __path__: /scripts/sync-manager.log

  - job_name: alerts
    static_configs:
      - targets:
          - localhost
        labels:
          job: alerts
          host: vm1
          __path__: /scripts/alerts.log
