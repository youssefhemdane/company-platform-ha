name: Deploy VM1 and VM2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint shell scripts
        run: |
          shellcheck scripts/*.sh || echo "Shellcheck warnings found (non-blocking)"

      - name: Validate docker-compose.yml
        run: |
          docker compose -f docker-compose.yml config > /dev/null

      - name: Run pytest in Docker
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -v "$(pwd)/app:/app" -w /app -e HOME=/tmp python:3.11-slim bash -c "pip install -q -r requirements.txt --user && python -m pytest tests/ -v"

  deploy-vm1:
    needs: test
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Backup current working version
        run: |
          rm -rf /home/ubuntoserver/backups/rollback
          mkdir -p /home/ubuntoserver/backups/rollback
          cp -r /home/ubuntoserver/company-platform /home/ubuntoserver/backups/rollback/company-platform
          cp -r /home/ubuntoserver/scripts /home/ubuntoserver/backups/rollback/scripts

      - name: Copy new files to project directory
        run: |
          cp -r * /home/ubuntoserver/company-platform/
          cp scripts/*.sh /home/ubuntoserver/scripts/
          chmod +x /home/ubuntoserver/scripts/*.sh

      - name: Restart Docker services
        run: |
          cd /home/ubuntoserver/company-platform
          docker compose up -d --build

      - name: Health check API VM1
        id: healthcheck
        run: |
          sleep 10
          curl -f http://localhost:8000/api/users || exit 1

      - name: Rollback on failure
        if: failure() && steps.healthcheck.outcome == 'failure'
        run: |
          echo "Health check failed, rolling back to previous version..."
          rm -rf /home/ubuntoserver/company-platform
          rm -rf /home/ubuntoserver/scripts
          cp -r /home/ubuntoserver/backups/rollback/company-platform /home/ubuntoserver/company-platform
          cp -r /home/ubuntoserver/backups/rollback/scripts /home/ubuntoserver/scripts
          chmod +x /home/ubuntoserver/scripts/*.sh
          cd /home/ubuntoserver/company-platform
          docker compose up -d --build
          sleep 10
          curl -f http://localhost:8000/api/users && echo "Rollback successful" || echo "Rollback health check also failed"

  deploy-vm2:
    needs: deploy-vm1
    runs-on: self-hosted
    steps:
      - name: Copy files to VM2 via SSH
        run: |
          scp -r /home/ubuntoserver/scripts/sync-manager.sh ubuntoserver@192.168.1.101:/home/ubuntoserver/scripts/
          scp -r /home/ubuntoserver/scripts/vault-helper.sh ubuntoserver@192.168.1.101:/home/ubuntoserver/scripts/

      - name: Health check API VM2
        run: |
          sleep 5
          curl -f http://192.168.1.101/api/users || exit 1

  notify:
    needs: [test, deploy-vm1, deploy-vm2]
    runs-on: self-hosted
    if: always()
    steps:
      - name: Notify success via Telegram
        if: needs.test.result == 'success' && needs.deploy-vm1.result == 'success' && needs.deploy-vm2.result == 'success'
        run: |
          source /home/ubuntoserver/scripts/vault-helper.sh
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" -d chat_id="$TELEGRAM_CHAT_ID" -d text="Tests et deploiement CI/CD reussis sur VM1 et VM2"

      - name: Notify failure via Telegram
        if: needs.test.result != 'success' || needs.deploy-vm1.result != 'success' || needs.deploy-vm2.result != 'success'
        run: |
          source /home/ubuntoserver/scripts/vault-helper.sh
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" -d chat_id="$TELEGRAM_CHAT_ID" -d text="Pipeline CI/CD ECHOUE - rollback automatique effectue si necessaire"